<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89CFF0"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGrad)" rx="20"/>

  <!-- Geometric "G" built from angular planes -->
  <g transform="translate(128, 112)">
    <!-- Outer G shape - top bar -->
    <path d="M40,-56 L40,-48 L12,-48 L12,-8 L28,-8 L28,-20 L12,-20 L12,-28 L36,-28 L36,0 L4,0 L4,-56 Z"
          fill="url(#lightBlue)" opacity="0.15"/>

    <!-- Main G stroke - angular geometric -->
    <!-- Top horizontal -->
    <line x1="8" y1="-52" x2="44" y2="-52" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>
    <!-- Right vertical (top) -->
    <line x1="44" y1="-52" x2="44" y2="-4" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>
    <!-- Middle horizontal (inward) -->
    <line x1="44" y1="-4" x2="20" y2="-4" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>
    <!-- Middle vertical (down) -->
    <line x1="20" y1="-4" x2="20" y2="-24" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>
    <!-- Middle horizontal (to right, inner cut) -->
    <line x1="20" y1="-24" x2="36" y2="-24" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>
    <!-- Left vertical -->
    <line x1="8" y1="-52" x2="8" y2="4" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>
    <!-- Bottom horizontal -->
    <line x1="8" y1="4" x2="44" y2="4" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>

    <!-- Accent slash through G -->
    <line x1="-4" y1="-60" x2="-20" y2="12" stroke="#64ffda" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Subtle grid dots -->
  <g fill="#4a9eff" opacity="0.12">
    <circle cx="40" cy="40" r="1.5"/>
    <circle cx="40" cy="60" r="1.5"/>
    <circle cx="60" cy="40" r="1.5"/>
    <circle cx="60" cy="60" r="1.5"/>
    <circle cx="196" cy="40" r="1.5"/>
    <circle cx="196" cy="60" r="1.5"/>
    <circle cx="216" cy="40" r="1.5"/>
    <circle cx="216" cy="60" r="1.5"/>
    <circle cx="40" cy="196" r="1.5"/>
    <circle cx="40" cy="216" r="1.5"/>
    <circle cx="60" cy="196" r="1.5"/>
    <circle cx="60" cy="216" r="1.5"/>
    <circle cx="196" cy="196" r="1.5"/>
    <circle cx="196" cy="216" r="1.5"/>
    <circle cx="216" cy="196" r="1.5"/>
    <circle cx="216" cy="216" r="1.5"/>
  </g>

  <!-- Bottom text -->
  <text x="128" y="200" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="600" fill="url(#blueGrad)" letter-spacing="6">GodoMaster</text>

  <!-- Thin underline -->
  <line x1="58" y1="210" x2="198" y2="210" stroke="url(#blueGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Version dot -->
  <circle cx="198" cy="210" r="2.5" fill="#64ffda" opacity="0.5"/>
</svg>