<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#0f1a3a"/>
    </linearGradient>
    <linearGradient id="gMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#478CBF"/>
      <stop offset="50%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#9D4EDD"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDD"/>
      <stop offset="100%" stop-color="#478CBF"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" fill="url(#bg)" rx="48"/>

  <!-- Geometric G — bold rounded letterform -->
  <!-- Main G arc (3/4 circle) -->
  <g transform="translate(128, 116)">
    <!-- Outer G shape — using path for solid rounded G -->
    <path d="
      M 0,-52
      A 52,52 0 1,0 52,0
      L 52,-4
      L 18,-4
      L 18,4
      L 60,4
      A 60,60 0 1,1 0,-60
      A 60,60 0 0,1 60,0
      L 50,0
      A 50,50 0 1,0 0,-50
      Z
    " fill="url(#gMain)" stroke="none"/>

    <!-- Inner accent dot for craftsman feel -->
    <circle cx="42" cy="-2" r="4" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="216" text-anchor="middle"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="3">GodoMaster</text>
</svg>
