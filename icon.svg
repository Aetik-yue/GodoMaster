<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="112" height="112" rx="22" ry="22" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="112" height="112" rx="22" ry="22" fill="none" stroke="#FF8C42" stroke-width="2" opacity="0.6"/>

  <!-- Game controller outline forming a "G" -->
  <g transform="translate(64, 64)">
    <!-- Controller body -->
    <path d="M-32,-8 L-36,-8 L-42,-16 L-42,-24 Q-42,-32 -34,-32 L-28,-32 Q-24,-32 -22,-28 L-18,-20 L-8,-20 L-8,-32 Q-8,-40 0,-40 Q8,-40 8,-32 L8,-20 L18,-20 L22,-28 Q24,-32 28,-32 L34,-32 Q42,-32 42,-24 L42,-16 L36,-8 L32,-8 Q32,-4 28,0 L-28,0 Q-32,-4 -32,-8 Z"
          fill="url(#orangeGrad)" filter="url(#glow)"/>

    <!-- Left grip -->
    <path d="M-32,0 L-32,8 Q-32,20 -22,28 L-18,30 Q-12,34 0,34 Q4,34 8,32 L8,8 L4,4 L-28,4 Q-32,4 -32,0 Z"
          fill="#FF8C42" opacity="0.9"/>

    <!-- Right grip -->
    <path d="M32,0 L32,8 Q32,20 22,28 L18,30 Q12,34 0,34 Q-4,34 -8,32 L-8,8 L-4,4 L28,4 Q32,4 32,0 Z"
          fill="#FF6D00" opacity="0.9"/>

    <!-- D-pad -->
    <rect x="-30" y="-6" width="6" height="18" rx="1" fill="#1a1a2e"/>
    <rect x="-33" y="-3" width="12" height="6" rx="1" fill="#1a1a2e"/>

    <!-- Action buttons -->
    <circle cx="24" cy="-4" r="4" fill="#1a1a2e"/>
    <circle cx="18" cy="-10" r="4" fill="#1a1a2e"/>

    <!-- Code brackets inside the controller -->
    <text x="-6" y="6" font-family="monospace" font-size="16" font-weight="bold" fill="#1a1a2e" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- "GM" letter mark -->
  <text x="100" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF8C42" opacity="0.8">GM</text>

  <!-- Decorative code dots -->
  <circle cx="24" cy="100" r="3" fill="#FF8C42" opacity="0.5"/>
  <circle cx="34" cy="100" r="3" fill="#FF6D00" opacity="0.5"/>
  <circle cx="44" cy="100" r="3" fill="#FF8C42" opacity="0.3"/>
</svg>