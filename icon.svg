<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#7b2cbf"/>
    </linearGradient>
    <linearGradient id="neonOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGrad)" rx="24"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="url(#neonCyan)" stroke-width="2" opacity="0.3"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="url(#neonCyan)" stroke-width="1" opacity="0.15"/>

  <!-- Hexagonal grid pattern -->
  <g stroke="#00f5ff" stroke-width="0.5" opacity="0.12">
    <polygon points="128,50 158,65 158,95 128,110 98,95 98,65" fill="none"/>
    <polygon points="78,95 108,110 108,140 78,155 48,140 48,110" fill="none"/>
    <polygon points="178,95 208,110 208,140 178,155 148,140 148,110" fill="none"/>
    <polygon points="103,145 133,160 133,190 103,205 73,190 73,160" fill="none"/>
    <polygon points="153,145 183,160 183,190 153,205 123,190 123,160" fill="none"/>
    <polygon points="128,20 150,31 150,53 128,64 106,53 106,31" fill="none"/>
  </g>

  <!-- Circuit lines -->
  <g stroke="#00f5ff" stroke-width="1.5" opacity="0.5" fill="none">
    <path d="M128,18 L128,50"/>
    <path d="M128,206 L128,238"/>
    <path d="M18,128 L50,128"/>
    <path d="M206,128 L238,128"/>
    <path d="M50,50 L70,70"/>
    <path d="M206,50 L186,70"/>
    <path d="M50,206 L70,186"/>
    <path d="M206,206 L186,186"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#00f5ff" opacity="0.6">
    <circle cx="128" cy="18" r="3"/>
    <circle cx="128" cy="238" r="3"/>
    <circle cx="18" cy="128" r="3"/>
    <circle cx="238" cy="128" r="3"/>
    <circle cx="50" cy="50" r="2"/>
    <circle cx="206" cy="50" r="2"/>
    <circle cx="50" cy="206" r="2"/>
    <circle cx="206" cy="206" r="2"/>
  </g>

  <!-- Central hexagon frame -->
  <polygon points="128,60 168,80 168,120 128,140 88,120 88,80"
           fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glow)"/>

  <!-- Inner hexagon -->
  <polygon points="128,75 155,90 155,115 128,130 101,115 101,90"
           fill="#0d1b2a" stroke="url(#neonPurple)" stroke-width="1.5" opacity="0.8"/>

  <!-- Game controller silhouette -->
  <g transform="translate(128, 102)">
    <path d="M-22,-6 L-26,-6 L-30,-12 L-30,-20 Q-30,-26 -24,-26 L-18,-26 Q-14,-26 -12,-22 L-8,-14 L-4,-14 L-4,-26 Q-4,-30 0,-30 Q4,-30 4,-26 L4,-14 L8,-14 L12,-22 Q14,-26 18,-26 L24,-26 Q30,-26 30,-20 L30,-12 L26,-6 L22,-6 Q22,-2 18,2 L-18,2 Q-22,-2 -22,-6 Z"
          fill="url(#neonOrange)" filter="url(#glow)"/>
    <!-- D-pad -->
    <rect x="-20" y="-4" width="4" height="12" rx="1" fill="#0a0a1a"/>
    <rect x="-22" y="-2" width="8" height="4" rx="1" fill="#0a0a1a"/>
    <!-- Buttons -->
    <circle cx="16" cy="-2" r="3" fill="#0a0a1a"/>
    <circle cx="12" cy="-6" r="3" fill="#0a0a1a"/>
    <!-- Code slash -->
    <text x="-2" y="3" font-family="monospace" font-size="10" font-weight="bold" fill="#0a0a1a" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- Orbiting dots -->
  <g fill="#00f5ff" opacity="0.7">
    <circle cx="128" cy="45" r="2"/>
    <circle cx="173" cy="63" r="2"/>
    <circle cx="83" cy="63" r="2"/>
  </g>

  <!-- GM text -->
  <text x="128" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="url(#neonCyan)" letter-spacing="4" opacity="0.9">GM</text>

  <!-- Corner accents -->
  <g stroke="#9d4edd" stroke-width="2" opacity="0.4">
    <path d="M20,30 L20,20 L30,20"/>
    <path d="M236,30 L236,20 L226,20"/>
    <path d="M20,226 L20,236 L30,236"/>
    <path d="M236,226 L236,236 L226,236"/>
  </g>
</svg>