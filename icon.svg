<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1929"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="50%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGrad)" rx="20"/>

  <!-- Outer hexagon (thin) -->
  <polygon points="128,30 206,64 206,136 128,170 50,136 50,64"
           fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>

  <!-- Main hexagon -->
  <polygon points="128,42 194,72 194,128 128,158 62,128 62,72"
           fill="none" stroke="url(#strokeGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Inner hexagon -->
  <polygon points="128,60 178,82 178,118 128,140 78,118 78,82"
           fill="#0b1929" fill-opacity="0.6" stroke="#4a9eff" stroke-width="1" opacity="0.35"/>

  <!-- Hex corner dots -->
  <g fill="#64ffda" opacity="0.7">
    <circle cx="128" cy="42" r="3"/>
    <circle cx="194" cy="72" r="3"/>
    <circle cx="194" cy="128" r="3"/>
    <circle cx="128" cy="158" r="3"/>
    <circle cx="62" cy="128" r="3"/>
    <circle cx="62" cy="72" r="3"/>
  </g>

  <!-- Center glow -->
  <circle cx="128" cy="100" r="28" fill="#4a9eff" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Code brackets -->
  <g transform="translate(128, 95)" filter="url(#glow)">
    <!-- Left < -->
    <path d="M-38,0 L-22,-18 L-22,-12 L-32,0 L-22,12 L-22,18 Z"
          fill="url(#fillGrad)" opacity="0.9"/>
    <!-- Right / > -->
    <path d="M38,0 L22,-18 L22,-12 L32,0 L22,12 L22,18 Z"
          fill="url(#fillGrad)" opacity="0.9"/>
    <!-- Slash -->
    <line x1="6" y1="-16" x2="-6" y2="16" stroke="#64ffda" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- GM text -->
  <text x="128" y="210" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="600" fill="url(#fillGrad)" letter-spacing="8" filter="url(#glow)">GM</text>

  <!-- Subtle tagline -->
  <text x="128" y="232" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="9" fill="#4a9eff" opacity="0.4" letter-spacing="3">GODOT MASTERY</text>

  <!-- Horizontal tech lines -->
  <g stroke="#4a9eff" stroke-width="1" opacity="0.2">
    <line x1="30" y1="185" x2="78" y2="185"/>
    <line x1="178" y1="185" x2="226" y2="185"/>
  </g>

  <!-- Small accent dots on tech lines -->
  <circle cx="78" cy="185" r="2" fill="#4a9eff" opacity="0.4"/>
  <circle cx="178" cy="185" r="2" fill="#4a9eff" opacity="0.4"/>
</svg>