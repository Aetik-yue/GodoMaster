<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 320" width="256" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2744"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGrad)" rx="20"/>

  <!-- Top accent line -->
  <rect x="40" y="0" width="176" height="3" rx="1.5" fill="url(#lineGrad)"/>

  <!-- Central code brackets with dot -->
  <g transform="translate(128, 128)" filter="url(#glow)">
    <!-- Left bracket -->
    <path d="M-60,0 L-80,0 Q-90,-30 -60,-60 Q-50,-70 -40,-60 L-40,-50 Q-45,-55 -50,-50 Q-55,-40 -50,-30 Q-45,-20 -40,-15 L-40,0"
          fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket -->
    <path d="M60,0 L80,0 Q90,-30 60,-60 Q50,-70 40,-60 L40,-50 Q45,-55 50,-50 Q55,-40 50,-30 Q45,-20 40,-15 L40,0"
          fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="-30" r="6" fill="url(#fillGrad)"/>
    <!-- Connecting lines -->
    <line x1="-40" y1="-30" x2="-20" y2="-30" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="-30" x2="20" y2="-30" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Horizontal tech lines -->
  <g stroke="url(#lineGrad)" stroke-width="1" opacity="0.3">
    <line x1="30" y1="80" x2="80" y2="80"/>
    <line x1="176" y1="80" x2="226" y2="80"/>
    <line x1="30" y1="176" x2="80" y2="176"/>
    <line x1="176" y1="176" x2="226" y2="176"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#4a9eff" stroke-width="2" opacity="0.6">
    <path d="M20,20 L20,35 L35,20"/>
    <path d="M236,20 L236,35 L221,20"/>
    <path d="M20,236 L20,221 L35,236"/>
    <path d="M236,236 L236,221 L221,236"/>
  </g>

  <!-- Small dots -->
  <g fill="#4a9eff" opacity="0.5">
    <circle cx="50" cy="128" r="2"/>
    <circle cx="206" cy="128" r="2"/>
    <circle cx="128" cy="50" r="2"/>
    <circle cx="128" cy="206" r="2"/>
  </g>
</svg>