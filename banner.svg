<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="300" fill="url(#bg)" rx="16"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Decorative grid lines -->
  <g stroke="#FF8C42" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="75" x2="1280" y2="75"/>
    <line x1="0" y1="150" x2="1280" y2="150"/>
    <line x1="0" y1="225" x2="1280" y2="225"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
    <line x1="640" y1="0" x2="640" y2="300"/>
    <line x1="960" y1="0" x2="960" y2="300"/>
  </g>

  <!-- Left side: Logo + Title -->
  <g transform="translate(60, 150)">
    <!-- Logo icon -->
    <g transform="translate(-50, -50)">
      <circle cx="0" cy="0" r="38" fill="#FF8C42" opacity="0.15"/>
      <circle cx="0" cy="0" r="30" fill="url(#accent)" filter="url(#glow)"/>
      <!-- Controller icon in circle -->
      <g transform="translate(-14, -12) scale(0.7)">
        <path d="M-10,0 L-12,0 L-14,-4 L-14,-8 Q-14,-12 -10,-12 L-6,-12 Q-2,-12 -1,-9 L1,-4 L4,-4 L4,-12 Q4,-14 8,-14 Q12,-14 12,-12 L12,-4 L10,0 Q9,2 6,2 L-6,2 Q-10,2 -10,0 Z" fill="#0f0f23"/>
        <rect x="-12" y="-2" width="2" height="6" rx="0.5" fill="#0f0f23"/>
        <rect x="-14" y="0" width="6" height="2" rx="0.5" fill="#0f0f23"/>
        <circle cx="10" cy="-1" r="2" fill="#0f0f23"/>
        <circle cx="7" cy="-4" r="2" fill="#0f0f23"/>
      </g>
    </g>

    <!-- Project name -->
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" letter-spacing="2">GodoMaster</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="18" fill="#888" letter-spacing="1">GODOT 4.X GAME DEVELOPMENT INTELLIGENCE</text>

    <!-- Tag line -->
    <text x="0" y="72" font-family="Arial, sans-serif" font-size="15" fill="#FF8C42">Claude Code Skill · GDScript · Nodes · 2D/3D · Physics · Shaders · Networking</text>
  </g>

  <!-- Right side: Stats -->
  <g transform="translate(1280, 150)" font-family="Arial, sans-serif">
    <!-- Stars -->
    <g transform="translate(-320, -40)">
      <rect width="90" height="70" rx="10" fill="#1e2a3a" stroke="#FF8C42" stroke-width="1" stroke-opacity="0.3"/>
      <text x="45" y="32" text-anchor="middle" font-size="26" font-weight="bold" fill="#FF8C42">-</text>
      <text x="45" y="55" text-anchor="middle" font-size="13" fill="#888">Stars</text>
    </g>
    <!-- Forks -->
    <g transform="translate(-210, -40)">
      <rect width="90" height="70" rx="10" fill="#1e2a3a" stroke="#FF8C42" stroke-width="1" stroke-opacity="0.3"/>
      <text x="45" y="32" text-anchor="middle" font-size="26" font-weight="bold" fill="#FF8C42">-</text>
      <text x="45" y="55" text-anchor="middle" font-size="13" fill="#888">Forks</text>
    </g>
    <!-- License -->
    <g transform="translate(-100, -40)">
      <rect width="90" height="70" rx="10" fill="#1e2a3a" stroke="#FF8C42" stroke-width="1" stroke-opacity="0.3"/>
      <text x="45" y="32" text-anchor="middle" font-size="26" font-weight="bold" fill="#FF8C42">MIT</text>
      <text x="45" y="55" text-anchor="middle" font-size="13" fill="#888">License</text>
    </g>
  </g>

  <!-- Bottom decorative bar -->
  <rect x="60" y="260" width="300" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Version badge -->
  <rect x="1140" y="20" width="80" height="28" rx="14" fill="#1e2a3a" stroke="#FF8C42" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1180" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FF8C42">v1.1.1</text>
</svg>
